spring.application.name=biyahenyo_backend
spring.datasource.url=jdbc:h2:file:./data/biyahenyo;MODE=MySQL;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${H2_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

server.port=8080
server.error.include-message=never

# JWT — set JWT_SECRET environment variable in production
jwt.secret=${JWT_SECRET:biyahenyo-dev-only-jwt-key-32chars!}
