spring.application.name=biyahenyo_backend
spring.datasource.url=jdbc:h2:mem:biyahenyo;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
server.error.include-message=always

# JWT
jwt.secret=biyahenyo-super-secret-jwt-key-change-in-production-32chars+
