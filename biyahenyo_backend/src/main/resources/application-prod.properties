# Production Profile
spring.application.name=biyahenyo_backend

# Database — use MySQL in production (set DB_URL, DB_USERNAME, DB_PASSWORD env vars)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/biyahenyo}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# H2 console — disabled in production
spring.h2.console.enabled=false

# Server
server.port=${PORT:8080}
server.error.include-message=never

# JWT — MUST be set via environment variable in production
jwt.secret=${JWT_SECRET}

# CORS — comma-separated list of allowed frontend origins
cors.allowed-origins=${CORS_ORIGINS:https://biyahenyo.vercel.app}
